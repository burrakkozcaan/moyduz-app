<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunuda Hero</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    .wrap { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; min-height: 100%; }
    .wrap > div { flex-shrink: 0; }
    /* Unicorn Studio watermark / "made with" branding gizleme */
    a[href*="unicorn"], a[href*="unicornstudio"], [class*="watermark"], [class*="us-logo"], [id*="unicorn"][id*="logo"] { display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div data-us-project="OL976bu46ulVy7HOsbJr" style="width:1440px; height:900px"></div>
  </div>
  <script type="text/javascript">!function(){var u=window.UnicornStudio;if(u&&u.init){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){u.init()})}else{u.init()}}else{window.UnicornStudio={isInitialized:!1};var i=document.createElement("script");i.src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.0.5/dist/unicornStudio.umd.js",i.onload=function(){if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){UnicornStudio.init()})}else{UnicornStudio.init()}},(document.head||document.body).appendChild(i)}}();</script>
  <script type="text/javascript">
    (function hideUnicornWatermark() {
      function hide() {
        document.querySelectorAll('a, span, div, p').forEach(function(el) {
          var t = (el.textContent || '').toLowerCase();
          if (t.indexOf('made with') !== -1 && t.indexOf('unicorn') !== -1) {
            el.style.setProperty('display', 'none', 'important');
            el.style.setProperty('visibility', 'hidden', 'important');
            el.style.setProperty('opacity', '0', 'important');
          }
        });
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hide);
      else hide();
      setTimeout(hide, 1500);
      setTimeout(hide, 3500);
    })();
  </script>
</body>
</html>
