name: Generate content PR

on:
  # Her gün 03:00 UTC (TR = 06:00)
  schedule:
    - cron: "0 3 * * *"
  # Manuel tetikleme (test için)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate MDX draft
        run: pnpm run content:generate

      - name: Check if new file was created
        id: check
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(content): auto-generate draft post"
          title: "Content draft: ${{ github.run_id }}"
          body: |
            ## Otomatik içerik taslağı

            Bu PR `scripts/content-generate.mjs` tarafından otomatik açıldı.

            ### Yapılacaklar:
            - [ ] `content/blog/` altındaki yeni dosyayı incele
            - [ ] İçeriği düzenle (başlık, bölümler, FAQ)
            - [ ] Frontmatter'daki `draft: true` → `draft: false` yap
            - [ ] `published_at` tarihini gözden geçir (şu an 7 gün ileri)
            - [ ] Merge et → Vercel otomatik deploy eder

            > **Not:** `draft: true` olduğu sürece post canlıda görünmez.
          branch: "auto/content-${{ github.run_id }}"
          delete-branch: true
          labels: "content,draft"
